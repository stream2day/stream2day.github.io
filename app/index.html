<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, runTransaction, onValue, get, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAikt1OPSzW_tm_Kl1xmSA8nm6U56ss2ZY",
    authDomain: "castfm-devs.firebaseapp.com",
    databaseURL: "https://castfm-devs-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "castfm-devs",
    storageBucket: "castfm-devs.firebasestorage.app",
    messagingSenderId: "393264903213",
    appId: "1:393264903213:web:dd7a2547fd9ffab50c34a4",
    measurementId: "G-G1K7ES0N45"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  runTransaction(ref(db, "app_download_page/pageVisits"), (current) => {
    return (current || 0) + 1;
  });

  onValue(ref(db, "app_download_page/pageVisits"), (snapshot) => {
    window._pageViews = snapshot.val() || 0;
    const el = document.getElementById("pageViewCount");
    if (el) el.textContent = window._pageViews >= 10000 ? (window._pageViews / 1000).toFixed(1) + "K" : window._pageViews;
    updateRatingMeta();
  });

  onValue(ref(db, "app_download_page/installClicks"), (snapshot) => {
    const count = snapshot.val() || 0;
    const el = document.getElementById("downloadCount");
    if (el) el.textContent = count >= 10000 ? (count / 1000).toFixed(1) + "K" : count;
  });

  window.trackInstallClick = function() {
    runTransaction(ref(db, "app_download_page/installClicks"), (current) => {
      return (current || 0) + 1;
    });
  };

  function updateRatingMeta() {
    get(ref(db, "app_download_page/ratings")).then((snap) => {
      const data = snap.val();
      const views = window._pageViews || 0;
      const viewsStr = views >= 10000 ? (views / 1000).toFixed(1) + "K" : views;
      const meta = document.getElementById("ratingMeta");
      if (!data) { if (meta) meta.textContent = "0 Ratings · " + viewsStr + " Views"; return; }
      const vals = Object.values(data);
      const avg = (vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(1);
      if (meta) meta.textContent = vals.length + " Ratings · " + viewsStr + " Views";
      const statRating = document.querySelector('.stat-val');
      if (statRating) statRating.innerHTML = avg + ' <span class="star">★</span>';
    });
  }
  updateRatingMeta();

  if (localStorage.getItem('stream2day_rated')) {
    document.getElementById("ratingThanks").textContent = "Thanks! Your rating has been saved.";
    var savedVal = parseInt(localStorage.getItem('stream2day_rating_val') || '0');
    if (savedVal) {
      document.querySelectorAll('.star-btn').forEach(function(s) {
        s.classList.toggle('active', parseInt(s.dataset.val) <= savedVal);
      });
    }
  }

  window.submitRating = function(val) {
    let uid = localStorage.getItem('stream2day_uid');
    if (!uid) { uid = 'u_' + Math.random().toString(36).slice(2,10); localStorage.setItem('stream2day_uid', uid); }
    set(ref(db, "app_download_page/ratings/" + uid), val).then(() => {
      localStorage.setItem('stream2day_rated', '1');
      localStorage.setItem('stream2day_rating_val', val);
      document.getElementById("ratingThanks").textContent = "Thanks! Your rating has been saved.";
      updateRatingMeta();
    });
  };
</script>

<script>
  function handleDownload(e) {
    e.preventDefault();
    var btn = document.getElementById('installBtn');
    var btnText = document.getElementById('btnText');
    var btnProgress = document.getElementById('btnProgress');
    var circle = document.getElementById('progressCircle');

    if (btn.classList.contains('installing') || btn.classList.contains('done')) return;

    if (typeof window.trackInstallClick === 'function') {
      window.trackInstallClick();
    }

    btn.classList.add('installing');
    btnText.textContent = 'Installing...';
    btnProgress.style.display = 'inline';

    var total = 2800;
    var start = Date.now();
    var circumference = 50.27;

    var timer = setInterval(function() {
      var elapsed = Date.now() - start;
      var progress = Math.min(elapsed / total, 1);
      var offset = circumference * (1 - progress);
      circle.style.strokeDashoffset = offset;

      if (progress >= 1) {
        clearInterval(timer);
        btn.classList.remove('installing');
        btn.classList.add('done');
        btnProgress.style.display = 'none';
        btnText.textContent = '✓ Download শুরু হচ্ছে';

        var a = document.createElement('a');
        a.href = 'https://stream2day.com/app/Stream2Day.apk';
        a.download = 'Stream2Day.apk';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        setTimeout(function() {
          btn.classList.remove('done');
          btnText.textContent = 'Install APK';
        }, 3000);
      }
    }, 30);
  }

  (function() {
    fetch('https://stream2day.com/sw.js')
      .then(function(r){ return r.text(); })
      .then(function(txt) {
        var match = txt.match(/CACHE\s*=\s*['"][^'"]*?([\d.]+)['"]/);
        var ver = match ? 'v' + match[1] : null;
        var el = document.getElementById('apkVersion');
        if (el && ver) el.textContent = ver;
      })
      .catch(function(){});
  })();

  (function() {
    fetch('https://stream2day.com/app/Stream2Day.apk', { method: 'HEAD' })
      .then(function(r) {
        var bytes = r.headers.get('content-length');
        if (bytes) {
          var mb = (parseInt(bytes) / (1024 * 1024)).toFixed(1);
          var el = document.getElementById('sizeVal');
          if (el) el.textContent = mb + ' MB';
        }
      })
      .catch(function(){});
  })();

  (function() {
    var stars = document.querySelectorAll('.star-btn');
    stars.forEach(function(star) {
      star.addEventListener('mouseenter', function() {
        var val = parseInt(this.dataset.val);
        stars.forEach(function(s) {
          s.classList.toggle('hover', parseInt(s.dataset.val) <= val);
        });
      });
      star.addEventListener('mouseleave', function() {
        stars.forEach(function(s) { s.classList.remove('hover'); });
      });
      star.addEventListener('click', function() {
        var val = parseInt(this.dataset.val);
        stars.forEach(function(s) {
          s.classList.toggle('active', parseInt(s.dataset.val) <= val);
        });
        if (typeof window.submitRating === 'function') window.submitRating(val);
      });
    });
  })();
</script>
