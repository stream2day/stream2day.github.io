name: Generate Keystore (One-Time Setup)

on:
  workflow_dispatch:
    inputs:
      keystore_password:
        description: 'Keystore password (min 6 chars)'
        required: true
      key_alias:
        description: 'Key alias'
        required: true
        default: 'stream2day'
      key_password:
        description: 'Key password (min 6 chars)'
        required: true

jobs:
  generate-keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore stream2day.keystore \
            -alias "${{ inputs.key_alias }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ inputs.keystore_password }}" \
            -keypass "${{ inputs.key_password }}" \
            -dname "CN=Stream2Day, OU=Dev, O=Stream2Day, L=Dhaka, S=Dhaka, C=BD"

      - name: Encode to base64
        run: |
          base64 -w 0 stream2day.keystore > keystore.b64
          echo "===== COPY THE BASE64 BELOW INTO KEYSTORE_BASE64 SECRET ====="
          cat keystore.b64
          echo ""
          echo "===== END ====="

      - name: Upload keystore as artifact
        uses: actions/upload-artifact@v4
        with:
          name: stream2day-keystore
          path: |
            stream2day.keystore
            keystore.b64
          retention-days: 7
          
