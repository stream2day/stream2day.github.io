name: Build Android APK
 
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'manifest.json'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > stream2day.keystore

      - name: Init Bubblewrap project
        run: |
          bubblewrap init \
            --manifest="https://stream2day.com/manifest.json" \
            --directory="./twa-project" \
            --skipPwaValidation \
            --alias="stream2day" \
            --alphaApp \
            --skipNoGoogleLogin \
            --quiet || true

      - name: Configure signing key
        run: |
          cp stream2day.keystore ./twa-project/android.keystore

      - name: Build APK
        working-directory: ./twa-project
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          bubblewrap build \
            --signingKeyPath=./android.keystore \
            --signingKeyAlias="${{ secrets.KEY_ALIAS }}" \
            --signingKeyPassword="$KEY_PASSWORD" \
            --signingKeyStorePassword="$KEYSTORE_PASSWORD"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: stream2day-apk
          path: ./twa-project/app-release-signed.apk
          retention-days: 14
          
