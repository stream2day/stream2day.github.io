name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.1)'
        required: false
        default: ''

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Copy app icons
        run: |
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          cp icons/icon-72x72.png   android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp icons/icon-72x72.png   android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp icons/icon-96x96.png   android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp icons/icon-96x96.png   android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp icons/icon-144x144.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp icons/icon-144x144.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp icons/icon-144x144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp icons/icon-144x144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp icons/icon-192x192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp icons/icon-192x192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Set version
        working-directory: android
        run: |
          VERSION_NAME="${{ github.event.inputs.version_name }}"
          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME="1.$(date +%Y%m%d)"
          fi
          VERSION_CODE=$(date +%s | cut -c1-9)
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV

      - name: Update version in build.gradle
        working-directory: android
        run: |
          sed -i "s/versionCode .*/versionCode ${{ env.VERSION_CODE }}/" app/build.gradle
          sed -i "s/versionName .*/versionName \"${{ env.VERSION_NAME }}\"/" app/build.gradle

      - name: Generate Gradle Wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.4

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Sign APK (Release)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        working-directory: android
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/keystore.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
            --no-daemon
          rm -f keystore.jks

      - name: Rename APK
        run: |
          mkdir -p output
          if [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            cp android/app/build/outputs/apk/debug/app-debug.apk \
               output/Stream2Day-${{ env.VERSION_NAME }}-debug.apk
          fi
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            cp android/app/build/outputs/apk/release/app-release.apk \
               output/Stream2Day-${{ env.VERSION_NAME }}.apk
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stream2Day-APK-${{ env.VERSION_NAME }}
          path: output/*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: Stream2Day v${{ env.VERSION_NAME }}
          body: |
            ## Stream2Day v${{ env.VERSION_NAME }}
            
            ### ডাউনলোড
            নিচের APK ফাইলটি ডাউনলোড করে ইনস্টল করুন।
            
            > **Note:** Unknown sources থেকে install করতে Settings → Security → Unknown Sources চালু করুন।
            
            Built automatically by GitHub Actions.
          files: output/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          cp icons/icon-72x72.png   android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp icons/icon-72x72.png   android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp icons/icon-96x96.png   android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp icons/icon-96x96.png   android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp icons/icon-144x144.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp icons/icon-144x144.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp icons/icon-144x144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp icons/icon-144x144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp icons/icon-192x192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp icons/icon-192x192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Set version
        working-directory: android
        run: |
          VERSION_NAME="${{ github.event.inputs.version_name }}"
          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME="1.$(date +%Y%m%d)"
          fi
          VERSION_CODE=$(date +%s | cut -c1-9)
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV

      - name: Update version in build.gradle
        working-directory: android
        run: |
          sed -i "s/versionCode .*/versionCode ${{ env.VERSION_CODE }}/" app/build.gradle
          sed -i "s/versionName .*/versionName \"${{ env.VERSION_NAME }}\"/" app/build.gradle

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Sign APK (Release)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        working-directory: android
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/keystore.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
            --no-daemon
          rm -f keystore.jks

      - name: Rename APK
        run: |
          mkdir -p output
          if [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            cp android/app/build/outputs/apk/debug/app-debug.apk \
               output/Stream2Day-${{ env.VERSION_NAME }}-debug.apk
          fi
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            cp android/app/build/outputs/apk/release/app-release.apk \
               output/Stream2Day-${{ env.VERSION_NAME }}.apk
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stream2Day-APK-${{ env.VERSION_NAME }}
          path: output/*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: Stream2Day v${{ env.VERSION_NAME }}
          body: |
            ## Stream2Day v${{ env.VERSION_NAME }}
            
            ### ডাউনলোড
            নিচের APK ফাইলটি ডাউনলোড করে ইনস্টল করুন।
            
            > **Note:** Unknown sources থেকে install করতে Settings → Security → Unknown Sources চালু করুন।
            
            Built automatically by GitHub Actions.
          files: output/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
